  <title>ENGINE DIAGNOSTICS | تشخيص أعطال المحركات</title>

      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;

      color: #f0f3f8;

      padding: 1rem;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: #0e1422;
      border-radius: 2rem;
      border: 1px solid #f5a623;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px black;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0b0f18;
      padding: 0.8rem 1rem;
      border-bottom: 3px solid #f5a623;
      gap: 10px;
    }
    .qr-code {
      width: 48px;
      height: 48px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }
    .qr-code canvas {
      width: 42px;
      height: 42px;
    }
    .title-section {
      text-align: center;
      flex: 1;
    }
    .title-fixed {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ffe6b0, #f5a623);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .title-translated {
      font-size: 0.75rem;
      color: #b9c7d9;
      margin-top: 4px;
    }
    .engine-icon {
      position: relative;
      cursor: pointer;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .engine-icon .fa-car-side {
      font-size: 2rem;
      color: #f5a623;
    }
    .engine-icon .fa-stethoscope {
      position: absolute;
      font-size: 1rem;
      top: 0;
      right: 0;
      background: #0b0f18;
      border-radius: 50%;
      padding: 2px;
      transform: translate(4px, -4px);
      color: #f5a623;
    }
    .info-strip {
      display: flex;
      justify-content: space-between;
      background: #00000066;
      padding: 6px 12px;
      font-size: 0.7rem;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .lang-device {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .lang-select {
      background: #1e2a3a;
      border: 1px solid #f5a623;
      border-radius: 40px;
      padding: 4px 8px;
      color: white;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .device-id {
      background: #1e2a3a;
      border-radius: 40px;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 0.7rem;
    }
    .free-badge {
      background: #f5a62320;
      text-align: center;
      margin: 12px 12px 6px;
      padding: 8px;
      border-radius: 40px;
      font-weight: bold;
      color: #f5a623;
    }
    .credit-card {
      background: #0f172a;
      border-radius: 1.5rem;
      margin: 12px;
      padding: 12px;
      text-align: center;
      border: 1px solid #f5a623;
    }
    .credit-amount {
      font-size: 1.8rem;
      font-weight: 800;
      color: #f5a623;
    }
    .pay-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    .pay-btn {
      background: #10b981;
      border: none;
      border-radius: 60px;
      padding: 6px 14px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      font-size: 0.8rem;
    }
    .engine-icons-row {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 12px;
      margin: 12px 12px 6px;
      padding: 8px;
      background: #0b0f18;
      border-radius: 30px;
    }
    .engine-icon-item {
      text-align: center;
      cursor: pointer;
      min-width: 65px;
    }
    .engine-icon-item i {
      font-size: 1.8rem;
      color: #f5a623;
      display: block;
      margin-bottom: 4px;
    }
    .engine-icon-item span {
      font-size: 0.65rem;
      display: block;
    }
    .btn-primary {
      background: #8b5cf6;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 40px;
      font-weight: bold;
      color: white;
      margin: 12px 0;
      cursor: pointer;
      font-size: 1rem;
    }
    .sensor-card {
      background: #1e2a3e;
      border-radius: 1.5rem;
      padding: 12px;
      margin: 12px;
      border: 2px solid #3b82f6;
    }
    .sensor-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .sensor-icon {
      font-size: 1.6rem;
      color: #f5a623;
    }
    .sensor-result {
      background: #03060c;
      border-radius: 1rem;
      padding: 8px;
      margin-top: 8px;
      font-size: 0.8rem;
      min-height: 55px;
      border: 1px dashed #f5a623;
    }

      background: #f97316;
      border: none;
      border-radius: 40px;
      padding: 6px 12px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result-area {
      background: #0a1020;
      border-radius: 1.5rem;
      margin: 12px;
      padding: 16px;
      border: 2px solid #f5a623;
      display: none;

      width: 100%;
      max-height: 160px;
      border-radius: 12px;
      margin-top: 6px;
      background: black;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #f97316;
      padding: 5px 15px;
      border-radius: 30px;
      opacity: 0;
      transition: 0.2s;
      z-index: 999;
      color: black;
      font-weight: bold;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
    }
    .modal-settings {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;

      visibility: visible;
    }

    <div style="margin-top:8px; display:flex; gap:6px;">

      <button id="activateLicenseBtn"></button>
    </div>
    <div id="adminHint" style="font-size:0.65rem; margin-top:4px;"></div>
  </div>

    <div class="engine-icon-item" data-engine-type="truck"><i class="fas fa-truck"></i><span id="engineTruckLabel"></span></div>

    <div class="engine-icon-item" data-engine-type="boat"><i class="fas fa-ship"></i><span id="engineBoatLabel"></span></div>
    <div class="engine-icon-item" data-engine-type="generator"><i class="fas fa-charging-station"></i><span id="engineGenLabel"></span></div>
    <div class="engine-icon-item" data-engine-type="tractor"><i class="fas fa-tractor"></i><span id="engineTractorLabel"></span></div>
  </div>

      <div id="dashPreview"></div>
      <button id="dashCamBtn" class="sensor-action-btn"></button>
      <div style="margin-top:8px"><input type="number" id="engineTemp" step="1" style="width:100%; padding:6px; border-radius:30px; border:none;"></div>
      <div id="dashResult" class="sensor-result"></div>
    </div>

    <div class="sensor-card">
      <div class="sensor-header"><i class="fas fa-smog sensor-icon"></i><span id="exhaustName"></span></div>
      <div id="exhaustPreview"></div>
      <button id="exhaustCamBtn" class="sensor-action-btn"></button>
      <div id="exhaustResult" class="sensor-result"></div>
    </div>

    <div class="sensor-card">
      <div class="sensor-header"><i class="fas fa-microphone sensor-icon"></i><span id="micName"></span></div>
      <div id="micResult" class="sensor-result"></div>
      <button id="startMicBtn" class="sensor-action-btn"></button>
    </div>

    <div class="sensor-card">
      <div class="sensor-header"><i class="fas fa-vibrate sensor-icon"></i><span id="vibName"></span></div>
      <div id="vibResult" class="sensor-result"></div>
      <button id="startVibBtn" class="sensor-action-btn"></button>
    </div>

    <button id="analyzeBtn" class="btn-primary" disabled></button>
    <button id="backBtn" class="btn-primary" style="background:#555;"></button>
  </div>

  <footer>© 2026 ENGINE DIAGNOSTICS | <span id="footerSub"></span></footer>
</div>

function generateQR(text, canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000000';
  const cells = 9;
  const cellSize = size / cells;
  for (let i = 0; i < cells; i++) {
    for (let j = 0; j < cells; j++) {
      const val = (i + j) % 2 === 0 ? 1 : 0;
      if (val === 1) ctx.fillRect(i * cellSize, j * cellSize, cellSize - 1, cellSize - 1);
    }
  }
  for (let corner of [[0,0], [cells-2,0], [0,cells-2]]) {
    ctx.fillRect(corner[0]*cellSize, corner[1]*cellSize, cellSize*2, cellSize*2);
  }
}

let sensorResults = { sound: null, vibration: null, smoke: null, temp: null };
let exhaustStream = null;

async function analyzeAudioFromStream(stream, duration = 4000) {
  return new Promise((resolve) => {
    const audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    let start = Date.now();
    let maxAmp = 0, freqSum = 0, count = 0;
    const interval = setInterval(() => {
      analyser.getByteFrequencyData(dataArray);
      let sum = 0; for (let v of dataArray) sum += v;
      let avg = sum / dataArray.length;
      if (avg > maxAmp) maxAmp = avg;
      let dominantIdx = 0;
      for (let i = 0; i < dataArray.length; i++) if (dataArray[i] > dataArray[dominantIdx]) dominantIdx = i;
      let freq = (dominantIdx * audioCtx.sampleRate) / analyser.fftSize;
      if (freq > 0) { freqSum += freq; count++; }
      if (Date.now() - start >= duration) {
        clearInterval(interval);
        audioCtx.close();
        let avgFreq = count ? freqSum / count : 0;
        let type = 'smooth';
        if (avgFreq > 800 && maxAmp > 180) type = 'screaming';
        else if (avgFreq > 300 && avgFreq < 800 && maxAmp > 150) type = 'knocking';
        else if (avgFreq < 200 && maxAmp > 220) type = 'thud';
        else if (avgFreq > 1200 && maxAmp < 100) type = 'whistle';
        else if (avgFreq > 600 && maxAmp > 100) type = 'roaring';
        resolve(type);
      }
    }, 50);
  });
}

  let unique = [...new Set(recordings)];

    sensorResults.sound = null;
  } else {

};

function startVibration(duration = 4000) {
  return new Promise((resolve) => {
    if (!window.DeviceMotionEvent) { resolve('low'); return; }
    let vals = [];
    let handler = e => {
      let a = e.accelerationIncludingGravity;
      if (a) vals.push(Math.sqrt(a.x * a.x + a.y * a.y + a.z * a.z));
    };
    window.addEventListener('devicemotion', handler);
    setTimeout(() => {
      window.removeEventListener('devicemotion', handler);
      let avg = vals.reduce((a, b) => a + b, 0) / (vals.length || 1);
      let level = 'low';
      if (avg > 15) level = 'severe';
      else if (avg > 9) level = 'high';
      else if (avg > 5) level = 'medium';
      resolve(level);
    }, duration);
  });
}

function inferFault() {
  let best = null, bestMatch = -1;
  for (let f of faultsDB) {
    let match = 0;
    if (f.sound === sensorResults.sound) match++;
    if (f.vibration === sensorResults.vibration) match++;
    if (f.smoke === sensorResults.smoke) match++;
    if (f.temp === sensorResults.temp) match++;
    if (match > bestMatch) { bestMatch = match; best = f; }
  }
  return best || faultsDB[0];
}
function getFaultName(fault) { return (currentLang === 'ar') ? fault.name_ar : fault.name_en; }
function getFaultSolution(fault) { return (currentLang === 'ar') ? fault.solution_ar : fault.solution_en; }

function calculateConfidence() {
  let score = 0;
  if (sensorResults.sound) score += 0.6;
  if (sensorResults.vibration) score += 0.2;
  if (sensorResults.smoke) score += 0.15;
  if (sensorResults.temp) score += 0.05;
  return Math.min(100, Math.floor(score * 100));
}

  let html = `<div><strong>🔍 ${t('diagnosis_title')}:</strong> ${diagName}</div>
              <div><strong>🔧 ${t('solution_title')}:</strong> ${diagSolution}</div>
              <div style="margin-top:8px; font-size:0.7rem; color:#a0a0a0;">📊 ${t('confidence_label')}: ${confidence}%</div>
              <div class="action-buttons">
                <button id="listenResultBtn" class="action-btn">🔊 ${t('listen')}</button>
                <button id="copyResultBtn" class="action-btn">📋 ${t('copy')}</button>
              </div>`;
  document.getElementById('resultPanel').innerHTML = html;
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('diagPanel').style.display = 'none';
  document.getElementById('listenResultBtn').onclick = () => {
    const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(diagName + ". " + diagSolution)}&tl=${currentLang}&client=tw-ob`;
    new Audio(url).play();
  };
  document.getElementById('copyResultBtn').onclick = () => {
    navigator.clipboard.writeText(diagName + " - " + diagSolution);
    showToastMsg('linkCopied');
  };
};

// ============================================================
// 7. التحكم العام
// ============================================================
document.getElementById('startBtn').onclick = () => {
  if (totalCredits() <= 0 && !admin) { showToastMsg('noCredits'); return; }
  document.getElementById('diagPanel').style.display = 'block';
  document.getElementById('resultPanel').style.display = 'none';
  resetSensors();
};
document.getElementById('backBtn').onclick = () => {
  document.getElementById('diagPanel').style.display = 'none';
  if (exhaustStream) exhaustStream.getTracks().forEach(t => t.stop());
};
document.querySelectorAll('.engine-icon-item').forEach(el => {
  el.addEventListener('click', () => {
    if (totalCredits() <= 0 && !admin) showToastMsg('noCredits');
    else { document.getElementById('diagPanel').style.display = 'block'; resetSensors(); }
  });
});
document.getElementById('settingsIcon')?.addEventListener('click', () => document.getElementById('settingsModal').classList.add('show'));
document.getElementById('closeSettingsBtn')?.addEventListener('click', () => document.getElementById('settingsModal').classList.remove('show'));

// ============================================================
// 8. وضع المطور (5 نقرات)
// ============================================================
let adminClicks = 0, adminTimer;
document.getElementById('secretAdminIcon').onclick = () => {
  adminClicks++;
  clearTimeout(adminTimer);
  adminTimer = setTimeout(() => { adminClicks = 0; }, 1000);
  if (adminClicks >= 5) {
    admin = true;
    updateCreditsUI();
    showToastMsg('adminActivated');
    document.getElementById('adminHint').innerHTML = t('adminHint');
    adminClicks = 0;
  }
};

// ============================================================
// 9. قائمة اللغات
// ============================================================
function buildLangSelect() {
  let sel = document.getElementById('langSelect');
  if (!sel) return;
  sel.innerHTML = '';
  for (let [code, info] of Object.entries(LANGS)) {
    let opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${info.flag} ${info.name}`;
    if (code === currentLang) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.onchange = () => {
    currentLang = sel.value;
    localStorage.setItem('appLang', currentLang);
    applyTranslations();
    resetSensors();
  };
}
buildLangSelect();
applyTranslations();
</script>
</body>
</html>
