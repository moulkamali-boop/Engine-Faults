function generateQR(text, canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#000000';
  const cells = 9;
  const cellSize = size / cells;
  for (let i = 0; i < cells; i++) {
    for (let j = 0; j < cells; j++) {
      const val = (i + j) % 2 === 0 ? 1 : 0;
      if (val === 1) ctx.fillRect(i * cellSize, j * cellSize, cellSize - 1, cellSize - 1);
    }
  }
  for (let corner of [[0,0], [cells-2,0], [0,cells-2]]) {
    ctx.fillRect(corner[0]*cellSize, corner[1]*cellSize, cellSize*2, cellSize*2);
  }
}

let sensorResults = { sound: null, vibration: null, smoke: null, temp: null };
let exhaustStream = null;
let isRecording = false, recordings = [];
async function analyzeAudioFromStream(stream, duration = 4000) {
  return new Promise((resolve) => {
    const audioCtx = new AudioContext();
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    let start = Date.now();
    let maxAmp = 0, freqSum = 0, count = 0;
    const interval = setInterval(() => {
      analyser.getByteFrequencyData(dataArray);
      let sum = 0; for (let v of dataArray) sum += v;
      let avg = sum / dataArray.length;
      if (avg > maxAmp) maxAmp = avg;
      let dominantIdx = 0;
      for (let i = 0; i < dataArray.length; i++) if (dataArray[i] > dataArray[dominantIdx]) dominantIdx = i;
      let freq = (dominantIdx * audioCtx.sampleRate) / analyser.fftSize;
      if (freq > 0) { freqSum += freq; count++; }
      if (Date.now() - start >= duration) {
        clearInterval(interval);
        audioCtx.close();
        let avgFreq = count ? freqSum / count : 0;
        let type = 'smooth';
        if (avgFreq > 800 && maxAmp > 180) type = 'screaming';
        else if (avgFreq > 300 && avgFreq < 800 && maxAmp > 150) type = 'knocking';
        else if (avgFreq < 200 && maxAmp > 220) type = 'thud';
        else if (avgFreq > 1200 && maxAmp < 100) type = 'whistle';
        else if (avgFreq > 600 && maxAmp > 100) type = 'roaring';
        resolve(type);
      }
    }, 50);
  });
}
document.getElementById('startMicBtn').onclick = async () => {
  if (isRecording) { showToastMsg('micAlready'); return; }
  isRecording = true;
  recordings = [];
  document.getElementById('micResult').innerHTML = t('micRecording');
  for (let i = 0; i < 3; i++) {
    try {
      let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      let type = await analyzeAudioFromStream(stream, 4000);
      recordings.push(type);
      let soundName = t(`sound${type.charAt(0).toUpperCase() + type.slice(1)}`) || type;
      document.getElementById('micResult').innerHTML = t('micRecorded', (i+1).toString(), soundName);
      stream.getTracks().forEach(t => t.stop());
      await new Promise(r => setTimeout(r, 800));
    } catch (e) { showToastMsg('micError'); isRecording = false; return; }
  }
  isRecording = false;
  let unique = [...new Set(recordings)];
  if (unique.length === 3) {
    document.getElementById('micResult').innerHTML = t('micThreeDiff');
    sensorResults.sound = null;
  } else {
    let finalSound = recordings[0];
    if (recordings[1] === recordings[2]) finalSound = recordings[1];
    else if (recordings[0] === recordings[1]) finalSound = recordings[0];
    sensorResults.sound = finalSound;
    let soundName = t(`sound${finalSound.charAt(0).toUpperCase() + finalSound.slice(1)}`) || finalSound;
    document.getElementById('micResult').innerHTML = t('micFinal', soundName);
  }
  checkAllReady();
};
function startVibration(duration = 4000) {
  return new Promise((resolve) => {
    if (!window.DeviceMotionEvent) { resolve('low'); return; }
    let vals = [];
    let handler = e => {
      let a = e.accelerationIncludingGravity;
      if (a) vals.push(Math.sqrt(a.x * a.x + a.y * a.y + a.z * a.z));
    };
    window.addEventListener('devicemotion', handler);
    setTimeout(() => {
      window.removeEventListener('devicemotion', handler);
      let avg = vals.reduce((a, b) => a + b, 0) / (vals.length || 1);
      let level = 'low';
      if (avg > 15) level = 'severe';
      else if (avg > 9) level = 'high';
      else if (avg > 5) level = 'medium';
      resolve(level);
    }, duration);
  });
}

  document.getElementById('vibResult').innerHTML = t('vibMeasuring');
  let level = await startVibration(4000);
  sensorResults.vibration = level;

  document.getElementById('vibResult').innerHTML = t('vibResult', levelName);

document.getElementById('exhaustCamBtn').onclick = async () => {
  try {
    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    exhaustStream = stream;
    let video = document.createElement('video');
    video.srcObject = stream; video.autoplay = true; video.playsInline = true;
    video.style.maxHeight = '150px';
    document.getElementById('exhaustPreview').innerHTML = '';
    document.getElementById('exhaustPreview').appendChild(video);
    setTimeout(() => {
      let canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      let ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let r = 0, g = 0, b = 0;
      for (let i = 0; i < imgData.length; i += 4) { r += imgData[i]; g += imgData[i+1]; b += imgData[i+2]; }
      let total = imgData.length / 4;
      r /= total; g /= total; b /= total;
      let smoke = 'none';
      if (r > 200 && g > 200 && b > 200) smoke = 'white';
      else if (r < 80 && g < 80 && b < 80) smoke = 'black';
      else if (r < 100 && g < 100 && b > 150) smoke = 'blue';
      else if (r > 150 && g > 150 && b < 100) smoke = 'gray';
      sensorResults.smoke = smoke;
      let smokeName = t(`smoke${smoke.charAt(0).toUpperCase() + smoke.slice(1)}`) || smoke;
      document.getElementById('exhaustResult').innerHTML = t('exhaustSmoke', smokeName);
      if (exhaustStream) exhaustStream.getTracks().forEach(t => t.stop());
      video.remove();
      checkAllReady();
    }, 3000);
  } catch (e) { showToastMsg('camError'); }
};

function inferFault() {
  let best = null, bestMatch = -1;
  for (let f of faultsDB) {
    let match = 0;
    if (f.sound === sensorResults.sound) match++;
    if (f.vibration === sensorResults.vibration) match++;
    if (f.smoke === sensorResults.smoke) match++;
    if (f.temp === sensorResults.temp) match++;
    if (match > bestMatch) { bestMatch = match; best = f; }
  }
  return best || faultsDB[0];
}
function getFaultName(fault) { return (currentLang === 'ar') ? fault.name_ar : fault.name_en; }
function getFaultSolution(fault) { return (currentLang === 'ar') ? fault.solution_ar : fault.solution_en; }
function calculateConfidence() {
  let score = 0;
  if (sensorResults.sound) score += 0.6;
  if (sensorResults.vibration) score += 0.2;
  if (sensorResults.smoke) score += 0.15;
  if (sensorResults.temp) score += 0.05;
  return Math.min(100, Math.floor(score * 100));
}
document.getElementById('analyzeBtn').onclick = async () => {
  if (!consumeCredit()) return;
  let confidence = calculateConfidence();
  if (confidence < 80) {
    let msg = t('low_confidence_msg', confidence.toString());
    document.getElementById('resultPanel').innerHTML = `<div style="padding: 12px; text-align: center;">⚠️ ${msg}</div><button id="backFromResult" class="btn-primary" style="background:#555; margin-top:12px;">↩️ ${t('backBtn')}</button>`;
    document.getElementById('resultPanel').style.display = 'block';
    document.getElementById('diagPanel').style.display = 'none';
    document.getElementById('backFromResult').onclick = () => {
      document.getElementById('resultPanel').style.display = 'none';
      document.getElementById('diagPanel').style.display = 'block';
    };
    return;
  }
  let fault = inferFault();
  let diagName = getFaultName(fault);
  let diagSolution = getFaultSolution(fault);
  let html = `<div><strong>🔍 ${t('diagTitle')}:</strong> ${diagName}</div>
              <div><strong>🔧 ${t('solution')}:</strong> ${diagSolution}</div>
              <div style="margin-top:8px; font-size:0.7rem; color:#a0a0a0;">📊 ${t('confidence_label')}: ${confidence}%</div>
              <div class="action-buttons">
                <button id="listenResultBtn" class="action-btn">🔊 ${t('listen')}</button>
                <button id="copyResultBtn" class="action-btn">📋 ${t('copy')}</button>
              </div>`;
  document.getElementById('resultPanel').innerHTML = html;
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('diagPanel').style.display = 'none';
  document.getElementById('listenResultBtn').onclick = () => {
    const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(diagName + ". " + diagSolution)}&tl=${currentLang}&client=tw-ob`;
    new Audio(url).play();
  };
  document.getElementById('copyResultBtn').onclick = () => {
    navigator.clipboard.writeText(diagName + " - " + diagSolution);
    showToastMsg('linkCopied');
  };
};

function buildLangSelect() {
  let sel = document.getElementById('langSelect');
  if (!sel) return;
  sel.innerHTML = '';
  for (let [code, info] of Object.entries(LANGS)) {
    let opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${info.flag} ${info.name}`;
    if (code === currentLang) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.onchange = () => {
    currentLang = sel.value;
    localStorage.setItem('appLang', currentLang);
    applyTranslations();
    resetSensors();
  };
}
